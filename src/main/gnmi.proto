// OpenConfig gNMI — minimal subset for NetShell
// https://github.com/openconfig/gnmi/blob/master/proto/gnmi/gnmi.proto
syntax = "proto3";
package gnmi;
option go_package = "github.com/openconfig/gnmi/proto/gnmi";

service gNMI {
  rpc Capabilities(CapabilityRequest)   returns (CapabilityResponse);
  rpc Get(GetRequest)                   returns (GetResponse);
  rpc Set(SetRequest)                   returns (SetResponse);
  rpc Subscribe(stream SubscribeRequest) returns (stream SubscribeResponse);
}

message CapabilityRequest  { repeated ModelData extension = 6; }
message CapabilityResponse { repeated ModelData supported_models = 1; repeated string supported_encodings = 2; string gNMI_version = 3; }
message ModelData { string name = 1; string organization = 2; string version = 3; }

message Path { repeated PathElem elem = 3; string origin = 4; string target = 6; }
message PathElem { string name = 1; map<string,string> key = 2; }

message TypedValue {
  oneof value {
    string   string_val   = 3;
    int64    int_val      = 5;
    uint64   uint_val     = 6;
    bool     bool_val     = 7;
    bytes    bytes_val    = 8;
    float    float_val    = 9;
    double   double_val   = 14;
    uint64   json_val     = 4;
    bytes    json_ietf_val = 10;
    string   ascii_val   = 11;
  }
}

message Update { Path path = 1; TypedValue val = 3; }
message Notification { int64 timestamp = 1; Path prefix = 2; repeated Update update = 4; repeated Path delete = 6; }

message GetRequest {
  Path prefix = 1;
  repeated Path path = 3;
  int32 type = 5;
  int32 encoding = 6;
}
message GetResponse { repeated Notification notification = 1; }

message SetRequest  { Path prefix = 1; repeated Path delete = 2; repeated Update replace = 3; repeated Update update = 4; }
message SetResponse { Path prefix = 1; repeated UpdateResult response = 2; }
message UpdateResult { Path path = 1; int32 op = 2; }

message SubscribeRequest  { oneof request { SubscriptionList subscribe = 1; Poll poll = 3; } }
message SubscribeResponse { oneof response { Notification update = 1; bool sync_response = 3; } }
message SubscriptionList  {
  Path prefix = 1;
  repeated Subscription subscription = 2;
  bool use_aliases = 3;
  QOSMarking qos = 4;
  int32 mode = 5;
  bool allow_aggregation = 6;
  repeated string use_models = 7;
  int32 encoding = 8;
  bool updates_only = 9;
}
message Subscription { Path path = 1; int32 mode = 2; uint64 sample_interval = 3; bool suppress_redundant = 4; uint64 heartbeat_interval = 5; }
message Poll {}
message QOSMarking { uint32 marking = 1; }
